name: CI/CD → Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
  WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  RESOURCE_GROUP: rg-banking-api
  ACR_NAME: wybanking

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure CLI
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            -u "$CLIENT_ID" \
            -p "$CLIENT_SECRET" \
            --tenant "$TENANT_ID"
          az account set --subscription "$SUBSCRIPTION_ID"

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          IMAGE="$ACR_LOGIN_SERVER/banking-api"
          SHA_TAG="${{ steps.tag.outputs.sha }}"
          docker build -t "$IMAGE:$SHA_TAG" .
          docker tag "$IMAGE:$SHA_TAG" "$IMAGE:latest"
          docker push "$IMAGE:$SHA_TAG"
          docker push "$IMAGE:latest"

      - name: Deploy to Azure App Service
        run: |
          IMAGE="$ACR_LOGIN_SERVER/banking-api"
          SHA_TAG="${{ steps.tag.outputs.sha }}"
          az webapp config container set \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --container-image-name "$IMAGE:$SHA_TAG"

      - name: Restart App Service
        run: az webapp restart --name "$WEBAPP_NAME" --resource-group "$RESOURCE_GROUP"